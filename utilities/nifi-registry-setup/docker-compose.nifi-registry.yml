version: '3.8'
name: nifi-registry

services:
  nifi-registry:
    image: apache/nifi-registry:2.0.0
    container_name: nifi-registry
    ports:
      - "18080:18080"
    environment:
      - NIFI_REGISTRY_WEB_HTTP_HOST=0.0.0.0
      - NIFI_REGISTRY_WEB_HTTP_PORT=18080
    volumes:
      - ./conf:/opt/nifi-registry/nifi-registry-current/conf
      - ./database:/opt/nifi-registry/nifi-registry-current/database
      - ./flow_storage:/opt/nifi-registry/nifi-registry-current/flow_storage
    networks:
      - nifi-registry-network
    restart: unless-stopped

# NETWORK DEFINITIONS
networks:
  nifi-registry-network:
    external: true